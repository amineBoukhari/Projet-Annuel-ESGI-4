services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    networks:
      - front-tier
      - back-tier

    volumes :
      - ./frontend:/app
      - /app/node_modules 

    command: npm run dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"

    networks:
      - back-tier

    volumes :
      - ./backend:/app
      - node_modules:/app/node_modules

    command: nodemon server.js




networks:
  # The presence of these objects is sufficient to define them
  front-tier: {}
  back-tier: {}

# This defines the named volume
volumes:
  node_modules: