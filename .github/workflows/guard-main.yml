name: Guard main branch

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR is from dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "::error::PRs into main must come from dev (this PR is from '${{ github.head_ref }}')"
            exit 1
          fi
          echo "OK: PR is from dev"
